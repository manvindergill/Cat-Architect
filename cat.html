<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Cat Wisdom</title>

  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="card">
    <h2>Senior Cat Architect Says</h2>

    <img id="catImage" alt="Random Cat" />

    <p id="fact">Loading wisdom...</p>

    <button id="generateBtn">Deploy New Wisdom</button>

    <div class="counter">
      Wisdoms deployed: <span id="count">0</span>
    </div>

    <div class="share-section">
  <a id="shareX" class="share x" target="_blank" aria-label="Share on X">
    <img src="./img/x.avif" alt="X logo" class="x-icon" />
  </a>
</div>

    <div class="footer">
      Powered by ManvinderGill
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
